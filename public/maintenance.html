<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance - Kolkata Bus Finder</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .maintenance-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      padding: 60px 40px;
      text-align: center;
    }

    .maintenance-icon {
      font-size: 80px;
      margin-bottom: 30px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    h1 {
      color: #333;
      font-size: 32px;
      margin-bottom: 15px;
      font-weight: 700;
    }

    .maintenance-message {
      color: #666;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .maintenance-subtitle {
      color: #999;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .estimated-time {
      background: #f0f4ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 30px;
      font-size: 14px;
      color: #555;
    }

    .contact-info {
      border-top: 1px solid #eee;
      padding-top: 30px;
      margin-top: 30px;
    }

    .contact-info p {
      color: #999;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .contact-link {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .contact-link:hover {
      color: #764ba2;
    }

    .status-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      background: #ff9500;
      border-radius: 50%;
      margin-right: 8px;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 49%, 100% { opacity: 1; }
      50%, 99% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="maintenance-container">
    <div class="maintenance-icon">🔧</div>
    <h1>Under Maintenance</h1>
    <p class="maintenance-message">
      We're currently performing scheduled maintenance to improve your experience.
    </p>
    <p class="maintenance-subtitle">
      <span class="status-indicator"></span>
      We'll be back soon!
    </p>
    <div class="estimated-time">
      ⏱️ Expected completion: <strong>Today, 2:00 PM IST</strong>
    </div>
    <div class="contact-info">
      <p>Thank you for your patience. If you have urgent questions:</p>
      <p>
        📧 <a href="mailto:support@kolkatabusfinder.com" class="contact-link">support@kolkatabusfinder.com</a>
      </p>
    </div>
  </div>
</body>
</html>
